version: "3.8"

services:
  # ── Frontend (Next.js) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - templeai

  # ── Backend (FastAPI) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - templeai

  # ── MongoDB (Local Development) ────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=templeai
    networks:
      - templeai

volumes:
  mongodb_data:

networks:
  templeai:
    driver: bridge
